name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.4.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  DH_REGISTRY: docker.io
  DH_IMAGE: adalwer/chegi
  GHCR_REGISTRY: ghcr.io

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    environment: docker
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ github.ref_type }}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="${{ inputs.version }}"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DH_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase ghcr image name
        id: ghcr
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "name=${OWNER,,}/chegi" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.DH_REGISTRY }}/${{ env.DH_IMAGE }}:latest
            ${{ env.DH_REGISTRY }}/${{ env.DH_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_REGISTRY }}/${{ steps.ghcr.outputs.name }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ steps.ghcr.outputs.name }}:${{ steps.version.outputs.version }}
