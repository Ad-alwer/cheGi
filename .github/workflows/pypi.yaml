name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -v

  pypi-publish:
    name: Build and Publish to PyPI
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chegi
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      - name: Update pyproject.toml version
        run: |
          sed -i 's/^version = .*/version = "'$VERSION'"/' pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check if version already exists on PyPI
        id: check_pypi
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/chegi/$VERSION/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on PyPI — skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found on PyPI — will publish"
          fi

      - name: Publish to PyPI (public)
        if: steps.check_pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to GitHub Packages (PyPI)
        if: steps.check_pypi.outputs.exists != 'true'
        run: |
          pip install twine
          twine upload --repository-url https://pypi.pkg.github.com/Ad-alwer/ \
            -u __token__ -p "${{ secrets.GITHUB_TOKEN }}" \
            dist/*.tar.gz dist/*.whl
