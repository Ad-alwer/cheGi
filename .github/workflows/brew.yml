name: Update Homebrew

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  trigger:
    name: Trigger homebrew formula update
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release event to homebrew-chegi
        run: |
          gh api repos/Ad-alwer/homebrew-chegi/dispatches \
            --raw-field event_type=release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
